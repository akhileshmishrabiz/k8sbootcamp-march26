---
name: pr checks for 3tier-app

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 879381241087.dkr.ecr.ap-south-1.amazonaws.com
  # environment_branch: prod

jobs:
  code-checks:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend
            ecr_repo: devopsdozo-frontend
            path: k8s-3-tier-app/app/frontend/
          - name: backend
            ecr_repo: devopsdozo-backend
            path: k8s-3-tier-app/app/backend/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # with:
        #   token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path}}
          file: Dockerfile
          push: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    
      - name: scan-image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:${{ github.sha }}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          ignore-unaddressable: true
          ignore-unauthenticated: true
